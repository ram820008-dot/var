<!DOCTYPE html>
<html>
<head>
    <title>Variables var let const DataTypes</title>
</head>
<body>

<script>
    // var example
    var a = 10;
    var a = 20; // can redeclare
    console.log("var:", a);

    // let example
    let b = 30;
    b = 40; // can update
    console.log("let:", b);

    // const example
    const c = 50;
    console.log("const:", c);

    // Data Types
    let name = "Ravi";        // string
    let age = 21;            // number
    let isStudent = true;    // boolean
    let x;                   // undefined
    let y = null;            // null

    console.log("String:", name);
    console.log("Number:", age);
    console.log("Boolean:", isStudent);
    console.log("Undefined:", x);
    console.log("Null:", y);
</script>

</body>
</html>
